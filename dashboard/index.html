<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>TCC x iNEST R&D Cockpit</title>

<style>
:root{--bg:#0d1117;--surface:#161b22;--surface2:#1c2128;--border:#30363d;--text:#e6edf3;--text-dim:#8b949e;--tcc:#38bdf8;--inest:#4ade80;--purple:#a78bfa;--amber:#fbbf24;--red:#f87171;--radius:10px;--transition:all .2s ease}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);line-height:1.6;font-size:14px}
.main{max-width:1600px;margin:0 auto;padding:16px 20px}
.header{display:flex;align-items:center;justify-content:space-between;padding:14px 0;margin-bottom:16px;border-bottom:1px solid var(--border)}
.header h1{font-size:20px;font-weight:700;background:linear-gradient(135deg,var(--tcc),var(--inest));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.header .sub{font-size:12px;color:var(--text-dim);margin-top:2px}
.header-nav{display:flex;gap:8px}
.header-nav button{padding:6px 14px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);border-radius:20px;cursor:pointer;font-size:12px;transition:var(--transition)}
.header-nav button.active{background:var(--surface2);color:var(--tcc);border-color:var(--tcc)}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(140px,1fr));gap:10px;margin-bottom:20px}
.metric-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center}
.metric-card .val{font-size:24px;font-weight:700}
.metric-card .label{font-size:11px;color:var(--text-dim);margin-top:4px}
.metric-card .val.tcc{color:var(--tcc)}
.metric-card .val.inest{color:var(--inest)}
.metric-card .val.purple{color:var(--purple)}
.section-title{font-size:15px;font-weight:600;margin:20px 0 12px;display:flex;align-items:center;gap:8px}
.section-title .badge{font-size:11px;font-weight:500;padding:2px 10px;border-radius:12px;background:var(--surface2);color:var(--text-dim)}
.today-plan-panel{background:linear-gradient(135deg,rgba(56,189,248,.08),rgba(74,222,128,.06));border:1px solid var(--border);border-radius:var(--radius);padding:16px 20px;margin-bottom:16px;position:relative;overflow:hidden}
.today-plan-panel::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--tcc),var(--inest))}
.today-plan-panel .plan-header{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.today-plan-panel .plan-header h4{font-size:14px;font-weight:600}
.today-plan-panel .plan-header .plan-date{font-size:12px;color:var(--text-dim);margin-left:auto}
.today-plan-panel .plan-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:6px}
.plan-item{display:flex;align-items:flex-start;gap:8px;padding:8px 12px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:13px;transition:var(--transition)}
.plan-item:hover{border-color:var(--tcc);transform:translateX(3px)}
.plan-dot{width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;flex-shrink:0;margin-top:1px}
.plan-dot.tcc-dot{background:rgba(56,189,248,.2);color:var(--tcc)}
.plan-dot.inest-dot{background:rgba(74,222,128,.2);color:var(--inest)}
.plan-dot.both-dot{background:rgba(167,139,250,.2);color:var(--purple)}
.daily-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:12px;margin-bottom:8px}
.daily-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px;transition:var(--transition)}
.daily-card:hover{border-color:rgba(255,255,255,.15)}
.daily-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px}
.daily-card-header .date{font-weight:600;font-size:13px}
.date-badge{font-size:11px;padding:2px 8px;border-radius:10px;font-weight:500}
.date-badge.yesterday{background:rgba(124,138,160,.15);color:var(--text-dim)}
.date-badge.past{background:rgba(124,138,160,.1);color:var(--text-dim)}
.daily-item{padding:5px 0;border-bottom:1px solid rgba(255,255,255,.04);font-size:12px;display:flex;align-items:flex-start;gap:6px}
.daily-item:last-child{border-bottom:none}
.daily-item .dot{width:5px;height:5px;border-radius:50%;margin-top:6px;flex-shrink:0}
.dot.done{background:var(--inest)}.dot.ongoing{background:var(--tcc)}.dot.plan{background:var(--text-dim)}
.daily-section-label{font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:8px 0 3px}
.view-panel{display:none}.view-panel.active{display:block}
.kanban-dual{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.kanban-column-group{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:14px}
.kanban-column-group h3{font-size:14px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border)}
.kanban-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
.kanban-col{background:var(--surface2);border-radius:6px;padding:10px;min-height:60px}
.kanban-col-header{font-size:12px;font-weight:600;color:var(--text-dim);margin-bottom:8px;display:flex;justify-content:space-between}
.kanban-col-header .count{background:var(--border);padding:1px 8px;border-radius:10px;font-size:10px}
.kanban-card{background:var(--surface);border:1px solid var(--border);border-radius:6px;padding:10px;margin-bottom:6px;cursor:pointer;transition:var(--transition)}
.kanban-card:hover{border-color:var(--tcc);box-shadow:0 2px 8px rgba(56,189,248,.1)}
.kanban-card .card-title{font-size:12px;font-weight:500;margin-bottom:4px;line-height:1.4}
.kanban-card .card-meta{display:flex;gap:6px;flex-wrap:wrap}
.card-tag{font-size:10px;padding:1px 6px;border-radius:8px}
.tag-done{background:rgba(74,222,128,.15);color:var(--inest)}
.tag-active{background:rgba(56,189,248,.15);color:var(--tcc)}
.tag-plan{background:rgba(251,191,36,.15);color:var(--amber)}
.tag-high{background:rgba(248,113,113,.15);color:var(--red)}
.tag-med{background:rgba(251,191,36,.15);color:var(--amber)}
table{width:100%;border-collapse:collapse;font-size:12px}
th,td{padding:7px 10px;text-align:left;border-bottom:1px solid var(--border)}
th{color:var(--text-dim);font-weight:500;cursor:pointer;white-space:nowrap}
th:hover{color:var(--tcc)}
tr:hover td{background:var(--surface2)}
.ver-link{cursor:pointer;color:var(--tcc);text-decoration:underline}
.status-chip{font-size:10px;padding:2px 8px;border-radius:10px}
.filter-group{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px}
.filter-chip{padding:4px 12px;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);border-radius:16px;cursor:pointer;font-size:12px}
.filter-chip.active{background:var(--tcc);color:#000;border-color:var(--tcc)}
.search-box{display:flex;align-items:center;gap:6px;background:var(--surface);border:1px solid var(--border);border-radius:8px;padding:6px 12px;margin-bottom:12px;width:300px}
.search-box input{background:none;border:none;color:var(--text);outline:none;font-size:13px;width:100%}
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.6);display:none;z-index:100}
.modal-overlay.show{display:flex;align-items:center;justify-content:center}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:24px;max-width:700px;width:90%;max-height:80vh;overflow-y:auto;position:relative}
.modal h3{font-size:18px;margin-bottom:12px;color:var(--tcc)}
.modal .close-btn{position:absolute;top:12px;right:12px;background:none;border:none;color:var(--text-dim);font-size:20px;cursor:pointer}
.modal .modal-field{margin-bottom:12px}
.modal .modal-field label{font-size:11px;color:var(--text-dim);text-transform:uppercase;letter-spacing:1px;display:block;margin-bottom:4px}
.modal .modal-field .val{font-size:13px}
.dim-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.dim-badge.tcc{background:rgba(56,189,248,.2);color:var(--tcc)}
.dim-badge.inest{background:rgba(74,222,128,.2);color:var(--inest)}
.btn-sm{padding:3px 10px;border:1px solid var(--border);background:var(--surface);color:var(--text);border-radius:6px;cursor:pointer;font-size:11px}
.btn-sm:hover{border-color:var(--tcc)}
.toast{position:fixed;bottom:20px;right:20px;background:var(--surface);border:1px solid var(--inest);border-radius:8px;padding:10px 16px;font-size:13px;z-index:200;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
@media(max-width:1200px){.kanban-dual{grid-template-columns:1fr}}
@media(max-width:768px){.kanban-grid{grid-template-columns:1fr}.daily-grid{grid-template-columns:1fr}.main{padding:10px}}
</style>
</head>

function renderMetrics(){
  var e=appData.entries||[];
  var tcc=e.filter(function(x){return x.dim==="TCC"}).length;
  var inest=e.filter(function(x){return x.dim==="iNEST"}).length;
  var active=e.filter(function(x){return["进行中","开发中","测试中","验证中","探索中","撰写中","持续更新","持续撰写"].indexOf(x.status)>=0}).length;
  var done=e.filter(function(x){return["已完成","已发布"].indexOf(x.status)>=0}).length;
  var m="";
  m+='<div class="metric-card"><div class="val tcc">'+tcc+'</div><div class="label">TCC Items</div></div>';
  m+='<div class="metric-card"><div class="val inest">'+inest+'</div><div class="label">iNEST Items</div></div>';
  m+='<div class="metric-card"><div class="val" style="color:var(--amber)">'+active+'</div><div class="label">Active</div></div>';
  m+='<div class="metric-card"><div class="val" style="color:var(--inest)">'+done+'</div><div class="label">Completed</div></div>';
  m+='<div class="metric-card"><div class="val purple">'+(appData.daily?appData.daily.length:0)+'</div><div class="label">Daily Records</div></div>';
  m+='<div class="metric-card"><div class="val tcc">'+e.filter(function(x){return x.cat==="论文"}).length+'</div><div class="label">Papers</div></div>';
  m+='<div class="metric-card"><div class="val inest">'+e.filter(function(x){return x.cat==="专利"}).length+'</div><div class="label">Patents</div></div>';
  document.getElementById("metrics").innerHTML=m;
}

function renderDaily(){
  try{
    var days=appData.daily||[];
    var today=(new Date()).toISOString().slice(0,10);
    var y=(new Date(Date.now()-86400000)).toISOString().slice(0,10);
    days.forEach(function(d){d._t=d.date===today?"today":d.date===y?"yesterday":"past"});
    document.getElementById("daily-badge").textContent="Last "+days.length+" days";
    var td=days.find(function(d){return d._t==="today"});
    var pl=document.getElementById("today-plan-list");
    var pe=document.getElementById("plan-empty");
    var pd=document.getElementById("plan-date");
    if(td&&td.plan&&td.plan.length){
      pd.textContent=td.date;
      pl.innerHTML=td.plan.map(function(p){
        var dc=p.dim==="TCC"?"tcc-dot":p.dim==="iNEST"?"inest-dot":"both-dot";
        return '<div class="plan-item"><span class="plan-dot '+dc+'">'+(p.dim||"?")[0]+'</span><span>'+p.text+' <span style="font-size:0.7em;color:var(--text-dim)">['+(p.dim||"")+']</span></span></div>';
      }).join("");
      pe.style.display="none";pl.style.display="";
    }else{pd.textContent=today;pl.innerHTML="";pl.style.display="none";pe.style.display=""}
    var pastDays=days.filter(function(d){return d._t!=="today"}).slice(0,3);
    var grid=document.getElementById("daily-grid");
    grid.innerHTML=pastDays.map(function(d){
      var h='<div class="daily-card"><div class="daily-card-header"><span class="date">'+d.date+'</span><span class="date-badge '+(d._t==="yesterday"?"yesterday":"past")+'">'+(d._t==="yesterday"?"Yesterday":d.date)+'</span></div>';
      if(d.progress&&d.progress.length){
        h+='<div class="daily-section-label">[Progress]</div>';
        h+=d.progress.slice(0,5).map(function(p){
          return '<div class="daily-item"><span class="dot '+p.dot+'"></span><span>'+p.text+' <span style="font-size:0.7em;color:var(--text-dim)">['+p.dim+']</span></span></div>';
        }).join("");
      }
      h+='</div>';return h;
    }).join("");
  }catch(e){
    document.getElementById("daily-grid").innerHTML='<div style="color:var(--red);padding:20px">Load error - refresh page</div>';
    console.error("renderDaily",e);
  }
}

function renderKanban(){
  document.getElementById("kanban-dual").innerHTML=DIMS.map(function(dim){
    var cols=CATS.map(function(cat){
      var items=appData.entries.filter(function(e){return e.dim===dim&&e.cat===cat});
      var col='<div class="kanban-col"><div class="kanban-col-header">'+catEmoji(cat)+" "+cat+'<span class="count">'+items.length+'</span></div>';
      items.forEach(function(item){
        col+='<div class="kanban-card" onclick="openDetail('+item.id+')"><div class="card-title">'+item.title+'</div><div class="card-meta"><span class="card-tag '+statusTag(item.status)+'">'+item.status+'</span><span>v'+item.ver+'</span><span class="card-tag '+(item.priority==="高"?"tag-high":"tag-med")+'">'+item.priority+'</span></div>'+(item.link?'<div style="font-size:0.7em;color:var(--tcc);margin-top:4px">'+item.link.split("/").pop()+'</div>':"")+'</div>';
      });
      if(!items.length)col+='<div style="font-size:11px;color:var(--text-dim);padding:6px;text-align:center">--</div>';
      col+='</div>';return col;
    }).join("");
    var title=dim==="TCC"?"TCC - Topology-Centric Computing":"iNEST - Emergent Network Intelligence";
    var icon=dim==="TCC"?"[T]":"[i]";
    return '<div class="kanban-column-group"><h3>'+icon+" "+title+'</h3><div class="kanban-grid">'+cols+'</div></div>';
  }).join("");
}

var indexSort={field:"date",dir:-1};
var indexFilters={dim:null,cat:null,status:null,search:""};
function sortArrow(f){if(indexSort.field!==f)return'<span>⇅</span>';return indexSort.dir===1?'<span>↑</span>':'<span>↓</span>'}
function toggleSort(f){if(indexSort.field===f)indexSort.dir*=-1;else{indexSort.field=f;indexSort.dir=1}applyIndexFilters()}
function setIndexFilter(t,v){indexFilters[t]=v;if(t==="search"){var sb=document.getElementById("index-search");if(sb)indexFilters.search=sb.value}renderIndexControls();applyIndexFilters()}
function renderIndexControls(){
  var h='<div class="search-box"><span>[S]</span><input type="text" placeholder="Search..." id="index-search" oninput="setIndexFilter(\'search\')" value="'+indexFilters.search+'"></div>';
  h+='<div class="filter-group">';
  h+='<button class="filter-chip '+(indexFilters.dim===null?"active":"")+'" onclick="setIndexFilter(\'dim\',null)">All</button>';
  DIMS.forEach(function(d){h+='<button class="filter-chip '+(indexFilters.dim===d?"active":"")+'" onclick="setIndexFilter(\'dim\',\''+d+'\')">'+d+'</button>'});
  h+='</div><div class="filter-group">';
  CATS.forEach(function(c){h+='<button class="filter-chip '+(indexFilters.cat===c?"active":"")+'" onclick="setIndexFilter(\'cat\',\''+c+'\')">'+catEmoji(c)+' '+c+'</button>'});
  h+='</div>';
  document.getElementById("filter-controls").innerHTML=h;
}
function applyIndexFilters(){
  var items=appData.entries.filter(function(e){
    if(indexFilters.dim&&e.dim!==indexFilters.dim)return false;
    if(indexFilters.cat&&e.cat!==indexFilters.cat)return false;
    if(indexFilters.search){var s=indexFilters.search.toLowerCase();if(e.title.toLowerCase().indexOf(s)<0&&e.desc.toLowerCase().indexOf(s)<0)return false}
    return true;
  });
  items.sort(function(a,b){
    var va=a[indexSort.field],vb=b[indexSort.field];
    if(typeof va==="string")va=va.toLowerCase();
    if(typeof vb==="string")vb=vb.toLowerCase();
    if(va<vb)return -1*indexSort.dir;
    if(va>vb)return 1*indexSort.dir;
    return 0;
  });
  document.getElementById("index-count").textContent=items.length+" items";
  var h='<tr><th onclick="toggleSort(\'dim\')">Dim '+sortArrow("dim")+'</th><th onclick="toggleSort(\'cat\')">Cat '+sortArrow("cat")+'</th><th onclick="toggleSort(\'title\')">Title '+sortArrow("title")+'</th><th onclick="toggleSort(\'status\')">Status '+sortArrow("status")+'</th><th onclick="toggleSort(\'ver\')">Ver '+sortArrow("ver")+'</th><th onclick="toggleSort(\'date\')">Date '+sortArrow("date")+'</th><th onclick="toggleSort(\'priority\')">Pri</th></tr>';
  items.forEach(function(e){
    h+='<tr><td><span class="dim-badge '+e.dim.toLowerCase()+'">'+e.dim+'</span></td><td>'+catEmoji(e.cat)+" "+e.cat+'</td><td><strong style="cursor:pointer" onclick="openDetail('+e.id+')">'+e.title+'</strong></td><td><span class="status-chip '+statusTag(e.status)+'">'+e.status+'</span></td><td>'+(e.link?'<span class="ver-link" onclick="openDetail('+e.id+')" title="'+e.link+'">'+e.ver+'</span>':e.ver)+'</td><td>'+e.date+'</td><td><span class="card-tag '+(e.priority==="高"?"tag-high":"tag-med")+'">'+e.priority+'</span></td></tr>';
  });
  document.getElementById("index-table").innerHTML=h;
}
function renderIndex(){renderIndexControls();applyIndexFilters()}

function resolvePath(link){
  if(!link)return'';
  return'obsidian://open?file='+encodeURIComponent(link);
}
function openDetail(id){
  var e=appData.entries.find(function(x){return x.id===id});
  if(!e)return;
  var linkHtml="";
  if(e.link){
    linkHtml='<div class="modal-field"><label>File</label><div class="val" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><a href="'+resolvePath(e.link)+'" style="color:var(--tcc);text-decoration:underline;word-break:break-all;cursor:pointer" target="_blank">'+e.link+'</a><button class="btn-sm" onclick="copyPath(\''+e.link.replace(/'/g,"\\'")+'\')">Copy</button></div></div>';
  }
  document.getElementById("modal-content").innerHTML=
    '<button class="close-btn" onclick="closeModal()">x</button>'+
    '<h3>'+e.title+'</h3>'+
    '<span class="dim-badge '+e.dim.toLowerCase()+'">'+e.dim+" - "+e.cat+'</span>'+
    '<div class="modal-field"><label>Version</label><div class="val">'+e.ver+'</div></div>'+
    '<div class="modal-field"><label>Status</label><div class="val"><span class="card-tag '+statusTag(e.status)+'">'+e.status+'</span></div></div>'+
    '<div class="modal-field"><label>Priority</label><div class="val">'+e.priority+'</div></div>'+
    '<div class="modal-field"><label>Date</label><div class="val">'+e.date+'</div></div>'+
    '<div class="modal-field"><label>Description</label><div class="val">'+e.desc+'</div></div>'+
    linkHtml;
  document.getElementById("modal-overlay").classList.add("show");
}
function closeModal(){document.getElementById("modal-overlay").classList.remove("show")}
function copyPath(p){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(p).then(function(){showToast("Copied: "+p)}).catch(function(){fallbackCopy(p)});
  }else{fallbackCopy(p)}
}
function fallbackCopy(t){var ta=document.createElement("textarea");ta.value=t;ta.style.position="fixed";ta.style.left="-9999px";document.body.appendChild(ta);ta.select();try{document.execCommand("copy");showToast("Copied")}catch(e){showToast("Copy failed")}document.body.removeChild(ta)}
function showToast(m){var t=document.createElement("div");t.className="toast";t.textContent=m;document.body.appendChild(t);setTimeout(function(){t.remove()},3000)}
function refreshAll(){renderMetrics();renderDaily();renderKanban();var av=document.querySelector(".view-panel.active");if(av&&av.id==="view-index")renderIndex()}
