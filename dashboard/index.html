<html lang="zh-CN">

<title>TCC × iNEST 研发全景看板</title>
<script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
<style>
/* TCC x iNEST R&D Kanban v2 */
:root{--bg:#080c14;--surface:#111827;--surface2:#1a2236;--border:#1e2d4a;--text:#e2e8f0;--text-dim:#7c8aa0;--tcc:#38bdf8;--tcc-glow:rgba(56,189,248,0.3);--tcc-bg:rgba(56,189,248,0.06);--inest:#4ade80;--inest-glow:rgba(74,222,128,0.3);--inest-bg:rgba(74,222,128,0.06);--warn:#fbbf24;--danger:#f87171;--purple:#a78bfa;--pink:#f472b6;--radius:10px;--transition:0.25s cubic-bezier(0.4,0,0.2,1)}
*{margin:0;padding:0;box-sizing:border-box}html{scroll-behavior:smooth}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,Segoe UI,Noto Sans SC,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;min-height:100vh}
body::before{content:"";position:fixed;inset:0;background:radial-gradient(ellipse 80% 60% at 30% 20%,rgba(56,189,248,0.04),transparent),radial-gradient(ellipse 70% 50% at 70% 80%,rgba(74,222,128,0.04),transparent);pointer-events:none;z-index:0}
.header{position:sticky;top:0;z-index:100;background:rgba(17,24,39,0.85);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;justify-content:space-between;gap:16px;flex-wrap:wrap}
.header-left{display:flex;align-items:center;gap:14px}
.header-logo{width:38px;height:38px;border-radius:10px;background:linear-gradient(135deg,var(--tcc),var(--inest));display:flex;align-items:center;justify-content:center;font-weight:800;font-size:16px;color:#000}
.header h1{font-size:1.15em;font-weight:600;letter-spacing:-0.3px}
.header h1 .tcc{color:var(--tcc)}.header h1 .inest{color:var(--inest)}
.header-nav{display:flex;gap:6px;flex-wrap:wrap}
.header-nav button{background:transparent;border:1px solid var(--border);color:var(--text-dim);padding:7px 16px;border-radius:20px;font-size:0.82em;cursor:pointer;transition:var(--transition);font-family:inherit}
.header-nav button:hover{border-color:var(--tcc);color:var(--text)}
.header-nav button.active{background:var(--tcc);border-color:var(--tcc);color:#000;font-weight:600}
.header-date{font-size:0.82em;color:var(--text-dim)}
.header-tagline{font-size:0.7em;color:var(--text-dim);opacity:0.7;font-style:italic}
.main{max-width:1640px;margin:0 auto;padding:24px 28px;position:relative;z-index:1}
.metrics{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:20px}
.metric{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;text-align:center;transition:var(--transition)}
.metric:hover{transform:translateY(-2px);box-shadow:0 8px 25px rgba(0,0,0,0.3)}
.metric .num{font-size:2em;font-weight:700;line-height:1;margin:4px 0}
.metric .lbl{font-size:0.73em;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px}
.metric.tcc{border-color:rgba(56,189,248,0.3)}.metric.tcc .num{color:var(--tcc)}
.metric.inest{border-color:rgba(74,222,128,0.3)}.metric.inest .num{color:var(--inest)}
.metric.warn .num{color:var(--warn)}.metric.purple .num{color:var(--purple)}
.section-title{font-size:1em;font-weight:600;margin:28px 0 14px;display:flex;align-items:center;gap:8px;letter-spacing:-0.2px}
.section-title .badge{font-size:0.7em;font-weight:500;padding:2px 10px;border-radius:12px;background:var(--surface2);color:var(--text-dim)}

.today-plan-panel{background:linear-gradient(135deg,rgba(56,189,248,0.08),rgba(74,222,128,0.06));border:1px solid var(--border);border-radius:var(--radius);padding:20px 24px;margin-bottom:16px;position:relative;overflow:hidden}
.today-plan-panel::before{content:"";position:absolute;top:0;left:0;width:4px;height:100%;background:linear-gradient(180deg,var(--tcc),var(--inest));border-radius:4px 0 0 4px}
.today-plan-panel .plan-header{display:flex;align-items:center;gap:10px;margin-bottom:14px}
.today-plan-panel .plan-header .plan-icon{font-size:1.4em}
.today-plan-panel .plan-header h4{font-size:1em;font-weight:600;color:var(--text)}
.today-plan-panel .plan-header .plan-date{font-size:0.75em;color:var(--text-dim);margin-left:auto}
.today-plan-panel .plan-list{list-style:none;display:grid;grid-template-columns:repeat(auto-fill,minmax(340px,1fr));gap:8px}
.today-plan-panel .plan-item{display:flex;align-items:flex-start;gap:10px;padding:10px 14px;background:var(--surface);border:1px solid var(--border);border-radius:8px;font-size:0.85em;transition:var(--transition)}
.today-plan-panel .plan-item:hover{border-color:var(--tcc);transform:translateX(3px)}
.today-plan-panel .plan-dot{width:20px;height:20px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:0.7em;flex-shrink:0;margin-top:1px}
.today-plan-panel .plan-dot.tcc-dot{background:rgba(56,189,248,0.2);color:var(--tcc)}
.today-plan-panel .plan-dot.inest-dot{background:rgba(74,222,128,0.2);color:var(--inest)}
.today-plan-panel .plan-dot.both-dot{background:rgba(167,139,250,0.2);color:var(--purple)}
.today-plan-empty{text-align:center;color:var(--text-dim);font-size:0.85em;padding:12px}
.daily-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(380px,1fr));gap:14px;margin-bottom:8px}
.daily-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;transition:var(--transition);cursor:default}
.daily-card:hover{border-color:rgba(255,255,255,0.15)}
.daily-card-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.daily-card-header .date{font-weight:600;font-size:0.95em}
.date-badge{font-size:0.7em;padding:3px 10px;border-radius:12px;font-weight:500}
.date-badge.today{background:rgba(56,189,248,0.2);color:var(--tcc)}
.date-badge.yesterday{background:rgba(124,138,160,0.15);color:var(--text-dim)}
.daily-item{padding:7px 0;border-bottom:1px solid rgba(255,255,255,0.04);font-size:0.84em;display:flex;align-items:flex-start;gap:8px}
.daily-item:last-child{border-bottom:none}
.daily-item .dot{width:6px;height:6px;border-radius:50%;margin-top:6px;flex-shrink:0}
.dot.done{background:var(--inest)}.dot.ongoing{background:var(--tcc)}.dot.plan{background:var(--text-dim)}
.daily-section-label{font-size:0.7em;font-weight:600;text-transform:uppercase;letter-spacing:1px;color:var(--text-dim);margin:10px 0 4px}
.view-panel{display:none}.view-panel.active{display:block}
.kanban-dual{display:grid;grid-template-columns:1fr 1fr;gap:20px}
.kanban-column-group h3{font-size:0.9em;font-weight:700;margin-bottom:12px;padding:8px 14px;border-radius:8px;letter-spacing:-0.2px}
.kanban-column-group.tcc h3{background:var(--tcc-bg);color:var(--tcc);border:1px solid rgba(56,189,248,0.2)}
.kanban-column-group.inest h3{background:var(--inest-bg);color:var(--inest);border:1px solid rgba(74,222,128,0.2)}
.kanban-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.kanban-col{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:12px;min-height:160px}
.kanban-col-header{font-size:0.75em;font-weight:600;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:6px}
.kanban-col-header .count{font-size:0.85em;color:var(--text-dim);margin-left:auto}
.kanban-card{background:var(--surface2);border:1px solid var(--border);border-radius:8px;padding:10px 12px;margin-bottom:8px;font-size:0.8em;transition:var(--transition);cursor:pointer}
.kanban-card:hover{border-color:rgba(255,255,255,0.2);transform:translateY(-1px);box-shadow:0 4px 15px rgba(0,0,0,0.3)}
.kanban-card .card-title{font-weight:500;margin-bottom:4px}
.kanban-card .card-meta{font-size:0.85em;color:var(--text-dim);display:flex;gap:8px;align-items:center;flex-wrap:wrap}
.card-tag{font-size:0.7em;padding:2px 8px;border-radius:4px;font-weight:500;white-space:nowrap}
.tag-done{background:rgba(74,222,128,0.15);color:var(--inest)}
.tag-ongoing{background:rgba(56,189,248,0.15);color:var(--tcc)}
.tag-plan{background:rgba(124,138,160,0.12);color:var(--text-dim)}
.tag-high{background:rgba(248,113,113,0.12);color:var(--danger)}
.tag-med{background:rgba(251,191,36,0.12);color:var(--warn)}
.index-controls{display:flex;gap:10px;margin-bottom:16px;flex-wrap:wrap;align-items:center}
.search-box{flex:1;min-width:220px;position:relative}
.search-box input{width:100%;background:var(--surface);border:1px solid var(--border);color:var(--text);padding:10px 14px 10px 38px;border-radius:24px;font-size:0.88em;font-family:inherit;outline:none;transition:var(--transition)}
.search-box input:focus{border-color:var(--tcc);box-shadow:0 0 0 3px var(--tcc-glow)}
.search-box .search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--text-dim)}
.filter-group{display:flex;gap:6px;flex-wrap:wrap}
.filter-chip{padding:6px 14px;border-radius:20px;font-size:0.78em;border:1px solid var(--border);background:var(--surface);color:var(--text-dim);cursor:pointer;transition:var(--transition);font-family:inherit;white-space:nowrap;user-select:none}
.filter-chip:hover{border-color:rgba(255,255,255,0.3);color:var(--text)}
.filter-chip.active{background:var(--tcc);border-color:var(--tcc);color:#000;font-weight:600}
.filter-chip.active.inest-chip{background:var(--inest);border-color:var(--inest);color:#000}
.table-wrap{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;overflow-x:auto}
.index-table{width:100%;border-collapse:collapse;font-size:0.84em}
.index-table th{text-align:left;padding:12px 16px;font-size:0.72em;font-weight:600;text-transform:uppercase;letter-spacing:0.8px;color:var(--text-dim);background:var(--surface2);border-bottom:1px solid var(--border);cursor:pointer;user-select:none;white-space:nowrap}
.index-table th:hover{color:var(--text)}
.index-table th .sort-arrow{margin-left:4px;font-size:0.7em}
.index-table td{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,0.03);vertical-align:middle}
.index-table tbody tr{transition:var(--transition)}
.index-table tbody tr:hover{background:rgba(255,255,255,0.02)}
.dim-badge{display:inline-block;padding:3px 10px;border-radius:4px;font-size:0.78em;font-weight:600}
.dim-badge.tcc{background:var(--tcc-bg);color:var(--tcc)}
.dim-badge.inest{background:var(--inest-bg);color:var(--inest)}
.ver-link{color:var(--tcc);text-decoration:underline;cursor:pointer;font-weight:500;transition:var(--transition)}
.ver-link:hover{color:#7dd3fc}
.no-results{text-align:center;padding:40px;color:var(--text-dim);font-size:0.9em}
.result-count{font-size:0.78em;color:var(--text-dim);margin-left:auto}
.btn-sm{background:none;border:1px solid var(--border);padding:4px 10px;border-radius:6px;cursor:pointer;font-size:0.8em;font-family:inherit;transition:var(--transition);white-space:nowrap}
.btn-sm:hover{border-color:rgba(255,255,255,0.3)}
.btn-sm.info{color:var(--tcc);border-color:rgba(56,189,248,0.3)}
.btn-sm.info:hover{background:rgba(56,189,248,0.1)}
.btn-sm.danger{color:var(--danger);border-color:rgba(248,113,113,0.3)}
.btn-sm.danger:hover{background:rgba(248,113,113,0.1)}
.btn-sm.edit{color:var(--warn);border-color:rgba(251,191,36,0.3)}
.btn-sm.edit:hover{background:rgba(251,191,36,0.1)}
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.7);backdrop-filter:blur(4px);z-index:200;display:flex;align-items:center;justify-content:center;opacity:0;pointer-events:none;transition:opacity 0.3s}
.modal-overlay.show{opacity:1;pointer-events:auto}
.modal{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:28px;max-width:580px;width:92%;max-height:82vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,0.5);position:relative}
.modal h3{font-size:1.1em;margin-bottom:8px;padding-right:30px}
.modal .close-btn{position:absolute;top:14px;right:18px;background:none;border:none;color:var(--text-dim);font-size:1.3em;cursor:pointer;transition:var(--transition)}
.modal .close-btn:hover{color:var(--text)}
.modal-field{margin-bottom:12px}
.modal-field label{display:block;font-size:0.72em;color:var(--text-dim);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:4px}
.modal-field .val{font-size:0.9em}
.modal-link{color:var(--tcc);text-decoration:underline;cursor:pointer;font-weight:500}
.modal-link:hover{color:#7dd3fc}
.form-input{width:100%;background:var(--surface2);border:1px solid var(--border);color:var(--text);padding:8px 10px;border-radius:6px;font-family:inherit;font-size:0.9em}
.form-input:focus{outline:none;border-color:var(--tcc);box-shadow:0 0 0 2px var(--tcc-glow)}
textarea.form-input{resize:vertical;min-height:60px}
.add-entry-btn{position:fixed;bottom:28px;right:28px;z-index:150;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--tcc),var(--inest));border:none;color:#000;font-size:1.6em;cursor:pointer;box-shadow:0 6px 24px rgba(56,189,248,0.3);transition:var(--transition);display:flex;align-items:center;justify-content:center}
.add-entry-btn:hover{transform:scale(1.08);box-shadow:0 8px 30px rgba(56,189,248,0.4)}
.paradigm-banner{background:linear-gradient(135deg,rgba(56,189,248,0.08),rgba(74,222,128,0.06));border:1px solid var(--border);border-radius:var(--radius);padding:14px 20px;margin-bottom:18px;font-size:0.85em;color:var(--text-dim);text-align:center}
.paradigm-banner strong{color:var(--tcc)}
.paradigm-banner em{color:var(--inest);font-style:normal}
@media(max-width:1200px){.kanban-dual{grid-template-columns:1fr}}
@media(max-width:768px){.kanban-grid{grid-template-columns:1fr 1fr}.daily-grid{grid-template-columns:1fr}.header{padding:10px 14px}.main{padding:14px}.metrics{grid-template-columns:repeat(auto-fit,minmax(120px,1fr))}}

</style>
</head>
<body>
<header class="header">
  <div class="header-left">
    <div class="header-logo">NX</div>
    <div>
      <h1><span class="tcc">TCC</span> × <span class="inest">iNEST</span> 研发全景看板</h1>
      <div class="header-tagline">计算范式：从<span class="tcc">节点中心</span>到<span class="inest">拓扑中心</span> | 拓扑中心计算 × 复杂网络涌现智能</div>
    </div>
  </div>
  <nav class="header-nav">
    <button class="active" data-view="kanban">📋 看板</button>
    <button data-view="index">📊 索引表</button>
  </nav>
  <div class="header-date" id="header-date"></div>
</header>

<main class="main">
  <div class="paradigm-banner">
    🧠 <strong>核心创新</strong>：将计算范式从「以节点为中心」转向「以拓扑为中心」—— 
    以网络拓扑结构本身作为计算的基本单元，通过 <strong>TCC</strong>（拓扑中心计算）架构与 <em>iNEST</em>（复杂网络涌现智能）框架，
    实现拓扑原生计算与智能涌现
  </div>
  <div class="metrics" id="metrics"></div>
  <div class="section-title">📅 每日进展与明日计划 <span class="badge" id="daily-badge"></span></div>
  
  <div class="today-plan-panel" id="today-plan-panel">
    <div class="plan-header">
      <span class="plan-icon">🎯</span>
      <h4>今日计划</h4>
      <span class="plan-date" id="plan-date"></span>
    </div>
    <div class="plan-list" id="today-plan-list"></div>
    <div class="today-plan-empty" id="plan-empty" style="display:none">暂无今日计划，新的一天加油！🚀</div>
  </div>
<div class="daily-grid" id="daily-grid"></div>

  <div class="view-panel active" id="view-kanban">
    <div class="kanban-dual" id="kanban-dual"></div>
  </div>

  <div class="view-panel" id="view-index">
    <div class="section-title">🔍 成果索引表 <span class="badge" id="index-badge"></span></div>
    <div class="index-controls" id="index-controls"></div>
    <div class="table-wrap">
      <table class="index-table">
        <thead id="index-thead"></thead>
        <tbody id="index-tbody"></tbody>
      </table>
      <div class="no-results" id="no-results" style="display:none">🔍 未找到匹配的条目 — 尝试调整筛选条件</div>
    </div>
  </div>
</main>

<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal-content" onclick="event.stopPropagation()"></div>
</div>

<button class="add-entry-btn" onclick="openAddForm()" title="添加新条目">+</button>

// ─── METRICS ───
function renderMetrics(){
  var e=appData.entries;
  var tcc=e.filter(function(x){return x.dim==="TCC"}).length;
  var inest=e.filter(function(x){return x.dim==="iNEST"}).length;
  var active=e.filter(function(x){return !["已完成","已发布"].includes(x.status)}).length;
  var done=e.filter(function(x){return ["已完成","已发布"].includes(x.status)}).length;
  var high=e.filter(function(x){return x.priority==="高"&&!["已完成","已发布"].includes(x.status)}).length;
  document.getElementById("metrics").innerHTML=
    '<div class="metric tcc"><div class="num">'+tcc+'</div><div class="lbl">TCC 拓扑中心</div></div>'+
    '<div class="metric inest"><div class="num">'+inest+'</div><div class="lbl">iNEST 涌现智能</div></div>'+
    '<div class="metric warn"><div class="num">'+active+'</div><div class="lbl">进行中</div></div>'+
    '<div class="metric" style="border-color:rgba(74,222,128,0.3)"><div class="num" style="color:var(--inest)">'+done+'</div><div class="lbl">已完成</div></div>'+
    '<div class="metric purple"><div class="num">'+high+'</div><div class="lbl">高优待办</div></div>';
}

// ─── DAILY ───
function renderDaily(){
  try{

  var days=appData.daily;
  document.getElementById("daily-badge").textContent="最近 "+days.length+" 天";
  
  var todayEntry=days.find(function(d){return d.type==="today"});
  var planList=document.getElementById("today-plan-list");
  var planEmpty=document.getElementById("plan-empty");
  var planDate=document.getElementById("plan-date");
  if(todayEntry&&todayEntry.plan&&todayEntry.plan.length){
    planDate.textContent=todayEntry.date+" "+WEEKDAYS[new Date(todayEntry.date).getDay()];
    planList.innerHTML=todayEntry.plan.map(function(p){
      var dotCls=p.dim==="TCC"?"tcc-dot":p.dim==="iNEST"?"inest-dot":"both-dot";
      var dimLabel=p.dim?p.dim:"";
      return '<div class="plan-item"><span class="plan-dot '+dotCls+'">'+dimLabel.charAt(0)+'</span><span>'+p.text+' <span style="font-size:0.7em;color:var(--text-dim);margin-left:4px">['+dimLabel+']</span></span></div>';
    }).join("");
    planEmpty.style.display="none";
    planList.style.display="";
  }else{
    if(todayEntry)planDate.textContent=todayEntry.date+" "+WEEKDAYS[new Date(todayEntry.date).getDay()];
    planList.innerHTML="";
    planList.style.display="none";
    planEmpty.style.display="";
  }
  
  document.getElementById("daily-grid").innerHTML=days.map(function(d){
    var isToday=d.type==="today";
    var dateLabel=isToday?"今天":d.type==="yesterday"?"昨天":fmtDate(d.date);
    var badgeCls=d.type==="today"?"today":d.type==="yesterday"?"yesterday":"past";
    var html='<div class="daily-card"><div class="daily-card-header"><span class="date">'+d.date+" "+WEEKDAYS[new Date(d.date).getDay()]+'</span><span class="date-badge '+badgeCls+'">'+dateLabel+'</span></div>';
    if(d.progress.length){html+='<div class="daily-section-label">📝 进展</div>';d.progress.forEach(function(p){html+='<div class="daily-item"><span class="dot '+p.dot+'"></span><span>'+p.text+' <span style="font-size:0.7em;color:var(--text-dim);margin-left:4px">['+p.dim+']</span></span></div>'})}
    if(!isToday&&d.plan.length){html+='<div class="daily-section-label">🎯 计划</div>';d.plan.forEach(function(p){html+='<div class="daily-item"><span class="dot '+p.dot+'"></span><span>'+p.text+' <span style="font-size:0.7em;color:var(--text-dim);margin-left:4px">['+p.dim+']</span></span></div>'})}

// ─── INDEX TABLE ───
var indexSort={field:"date",dir:-1};
var indexFilters={dim:null,cat:null,status:null,search:""};

function sortArrow(field){
  if(indexSort.field!==field)return'<span class="sort-arrow">⇅</span>';
  return indexSort.dir===1?'<span class="sort-arrow">↑</span>':'<span class="sort-arrow">↓</span>';
}

function toggleSort(field){
  if(indexSort.field===field)indexSort.dir*=-1;
  else{indexSort.field=field;indexSort.dir=1}
  applyIndexFilters();
}

// FIXED: setIndexFilter now re-renders controls AND guards index-search access
function setIndexFilter(type,val){
  indexFilters[type]=val;
  if(type==="search"){
    var sb=document.getElementById("index-search");
    if(sb)indexFilters.search=sb.value;
  }
  // Re-render controls to update active chip states
  renderIndexControls();
  applyIndexFilters();
}

function renderIndexControls(){
  var h='<div class="search-box"><span class="search-icon">🔍</span><input type="text" placeholder="搜索标题、描述、版本..." id="index-search" oninput="setIndexFilter(\"search\")" value="'+indexFilters.search+'"></div>';
  // Dimension filters
  h+='<div class="filter-group">';
  h+='<button class="filter-chip '+(indexFilters.dim===null?"active":"")+'" onclick="setIndexFilter(&quot;dim&quot;,null)">全部维度</button>';
  h+='<button class="filter-chip '+(indexFilters.dim==="TCC"?"active":"")+'" onclick="setIndexFilter(&quot;dim&quot;,&quot;TCC&quot;)">TCC</button>';
  h+='<button class="filter-chip '+(indexFilters.dim==="iNEST"?"active inest-chip":"")+'" onclick="setIndexFilter(&quot;dim&quot;,&quot;iNEST&quot;)">iNEST</button>';
  h+='</div>';
  // Category filters
  h+='<div class="filter-group">';
  h+='<button class="filter-chip '+(indexFilters.cat===null?"active":"")+'" onclick="setIndexFilter(&quot;cat&quot;,null)">全部分类</button>';
  CATS.forEach(function(c){h+='<button class="filter-chip '+(indexFilters.cat===c?"active":"")+'" onclick="setIndexFilter(&quot;cat&quot;,&quot;'+c+'&quot;)">'+c+'</button>'});
  h+='</div>';
  // Status filters
  h+='<div class="filter-group">';
  h+='<button class="filter-chip '+(indexFilters.status===null?"active":"")+'" onclick="setIndexFilter(&quot;status&quot;,null)">全部状态</button>';
  STATUSES.slice(0,7).forEach(function(s){h+='<button class="filter-chip '+(indexFilters.status===s?"active":"")+'" onclick="setIndexFilter(&quot;status&quot;,&quot;'+s+'&quot;)">'+s+'</button>'});
  h+='</div>';
  h+='<span class="result-count" id="result-count"></span>';
  document.getElementById("index-controls").innerHTML=h;
}

function applyIndexFilters(){
  var entries=[].concat(appData.entries);
  if(indexFilters.dim)entries=entries.filter(function(e){return e.dim===indexFilters.dim});
  if(indexFilters.cat)entries=entries.filter(function(e){return e.cat===indexFilters.cat});
  if(indexFilters.status)entries=entries.filter(function(e){return e.status===indexFilters.status});
  if(indexFilters.search){
    var q=indexFilters.search.toLowerCase();
    entries=entries.filter(function(e){return e.title.toLowerCase().indexOf(q)>=0||e.desc.toLowerCase().indexOf(q)>=0||e.ver.toLowerCase().indexOf(q)>=0});
  }

  var f=indexSort.field,d=indexSort.dir;
  var prioMap={"高":3,"中":2,"低":1};
  entries.sort(function(a,b){
    var va,vb;
    if(f==="priority"){va=prioMap[a.priority]||0;vb=prioMap[b.priority]||0}
    else if(f==="date"){va=a.date;vb=b.date}
    else{va=(a[f]||"").toString();vb=(b[f]||"").toString()}
    if(va<vb)return -1*d;if(va>vb)return 1*d;return 0;
  });

  var rc=document.getElementById("result-count");
  if(rc)rc.textContent="共 "+entries.length+" 条";
  var ib=document.getElementById("index-badge");
  if(ib)ib.textContent=entries.length+" 条记录";

  if(!entries.length){
    document.getElementById("index-tbody").innerHTML="";
    document.getElementById("no-results").style.display="block";
    return;
  }
  document.getElementById("no-results").style.display="none";

  document.getElementById("index-tbody").innerHTML=entries.map(function(e){
    var dimCls=e.dim.toLowerCase();
    return '<tr>'+
      '<td><span class="dim-badge '+dimCls+'">'+e.dim+'</span></td>'+
      '<td>'+catEmoji(e.cat)+" "+e.cat+'</td>'+
      '<td><strong style="cursor:pointer" onclick="openDetail('+e.id+')" title="点击查看详情">'+e.title+'</strong></td>'+
      '<td>'+(e.link?'<span class="ver-link" onclick="openDetail('+e.id+')" title="'+e.link+'">'+e.ver+'</span>':e.ver)+'</td>'+
      '<td><span class="card-tag '+statusTag(e.status)+'">'+e.status+'</span></td>'+
      '<td><span class="card-tag '+(e.priority==="高"?"tag-high":e.priority==="中"?"tag-med":"")+'">'+e.priority+'</span></td>'+
      '<td style="white-space:nowrap">'+e.date+'</td>'+
      '<td style="white-space:nowrap">'+
        '<button class="btn-sm info" onclick="openDetail('+e.id+')">详情</button> '+
        '<button class="btn-sm edit" onclick="openEditForm('+e.id+')">编辑</button> '+
        '<button class="btn-sm danger" onclick="deleteEntry('+e.id+')">删除</button>'+
      '</td></tr>';
  }).join("");
}

function renderIndex(){
  document.getElementById("index-thead").innerHTML='<tr>'+
    '<th onclick="toggleSort(&quot;dim&quot;)">维度 '+sortArrow("dim")+'</th>'+
    '<th onclick="toggleSort(&quot;cat&quot;)">分类 '+sortArrow("cat")+'</th>'+
    '<th onclick="toggleSort(&quot;title&quot;)">名称 '+sortArrow("title")+'</th>'+
    '<th onclick="toggleSort(&quot;ver&quot;)">版本 '+sortArrow("ver")+'</th>'+
    '<th onclick="toggleSort(&quot;status&quot;)">状态 '+sortArrow("status")+'</th>'+
    '<th onclick="toggleSort(&quot;priority&quot;)">优先级 '+sortArrow("priority")+'</th>'+
    '<th onclick="toggleSort(&quot;date&quot;)">更新时间 '+sortArrow("date")+'</th>'+
    '<th>操作</th></tr>';
  renderIndexControls();
  applyIndexFilters();
}

// ─── DETAIL MODAL (with copyable links) ───
function resolvePath(link){
  var isMd=/\.md$/i.test(link);
  var vaultPath;
  var outside=["GetNotes_Inbox/","scripts/","iNEST_CS","iNEST对外","DEMO_SCRIPT"];
  var isOutside=false;
  for(var i=0;i<outside.length;i++){
    if(link.indexOf(outside[i])===0){isOutside=true;break}
  }
  if(isOutside){
    vaultPath=link;
  }else{
    vaultPath="home/work/.openclaw/workspace/"+link;
  }
  if(isMd){
    return"obsidian://open?file="+encodeURIComponent(vaultPath);
  }
  var base=isOutside?"D:/Obsidian/":"D:/Obsidian/home/work/.openclaw/workspace/";
  return"file:///"+base+link;
}
function openDetail(id){
  var e=appData.entries.find(function(x){return x.id===id});
  if(!e)return;
  var linkHtml="";
  if(e.link){
    linkHtml='<div class="modal-field"><label>关联文件</label><div class="val" style="display:flex;align-items:center;gap:8px;flex-wrap:wrap"><a href="'+resolvePath(e.link)+'" style="color:var(--tcc);text-decoration:underline;word-break:break-all" target="_blank">'+e.link+'</a><button class="btn-sm info" onclick="copyPath(\''+e.link.replace(/'/g,"\\'")+'\')">📋 复制路径</button></div></div>';
  }
  document.getElementById("modal-content").innerHTML=
    '<button class="close-btn" onclick="closeModal()">✕</button>'+
    '<h3>'+e.title+'</h3>'+
    '<span class="modal-dim dim-badge '+e.dim.toLowerCase()+'">'+e.dim+" · "+e.cat+'</span>'+
    '<div class="modal-field"><label>版本</label><div class="val">'+e.ver+'</div></div>'+
    '<div class="modal-field"><label>状态</label><div class="val"><span class="card-tag '+statusTag(e.status)+'">'+e.status+'</span></div></div>'+
    '<div class="modal-field"><label>优先级</label><div class="val"><span class="card-tag '+(e.priority==="高"?"tag-high":e.priority==="中"?"tag-med":"")+'">'+e.priority+'</span></div></div>'+
    '<div class="modal-field"><label>更新时间</label><div class="val">'+e.date+'</div></div>'+
    '<div class="modal-field"><label>描述</label><div class="val">'+e.desc+'</div></div>'+
    linkHtml;
  document.getElementById("modal-overlay").classList.add("show");
}

// Copy file path to clipboard
function copyPath(path){
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(path).then(function(){
      showToast("已复制: "+path);
    }).catch(function(){fallbackCopy(path)});
  }else{fallbackCopy(path)}
}
function fallbackCopy(text){
  var ta=document.createElement("textarea");
  ta.value=text;ta.style.position="fixed";ta.style.left="-9999px";
  document.body.appendChild(ta);ta.select();
  try{document.execCommand("copy");showToast("已复制: "+text)}
  catch(e){showToast("复制失败，请手动复制")}
  document.body.removeChild(ta);
}

// Toast notification
function showToast(msg){
  var t=document.createElement("div");
  t.textContent=msg;
  t.style.cssText="position:fixed;bottom:100px;left:50%;transform:translateX(-50%);background:var(--surface2);color:var(--text);padding:10px 20px;border-radius:20px;font-size:0.85em;z-index:300;border:1px solid var(--border);box-shadow:0 4px 20px rgba(0,0,0,0.4);animation:fadeInOut 2.5s forwards";
  var style=document.createElement("style");
  style.textContent="@keyframes fadeInOut{0%{opacity:0;transform:translateX(-50%) translateY(10px)}15%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}";
  document.head.appendChild(style);
  document.body.appendChild(t);
  setTimeout(function(){t.remove();style.remove()},2600);
}

  var catOpts=CATS.map(function(c){return'<option value="'+c+'"'+(c===e.cat?' selected':'')+'>'+c+'</option>'}).join("");

    '<div class="modal-field"><label>标题</label><input id="edit-title" class="form-input" value="'+e.title.replace(/"/g,"&quot;")+'" required></div>'+
    '<div class="modal-field"><label>版本</label><input id="edit-ver" class="form-input" value="'+e.ver+'"></div>'+
    '<div class="modal-field"><label>状态</label><select id="edit-status" class="form-input">'+statOpts+'</select></div>'+
    '<div class="modal-field"><label>优先级</label><select id="edit-priority" class="form-input">'+prioOpts+'</select></div>'+
    '<div class="modal-field"><label>描述</label><textarea id="edit-desc" class="form-input" rows="3">'+e.desc+'</textarea></div>'+

function saveEdit(ev,id){
  ev.preventDefault();
  var e=appData.entries.find(function(x){return x.id===id});if(!e)return;
  e.dim=document.getElementById("edit-dim").value;
  e.cat=document.getElementById("edit-cat").value;
  e.title=document.getElementById("edit-title").value;
  e.ver=document.getElementById("edit-ver").value;
  e.status=document.getElementById("edit-status").value;
  e.priority=document.getElementById("edit-priority").value;
  e.desc=document.getElementById("edit-desc").value;
  e.link=document.getElementById("edit-link").value||null;
  e.date=new Date().toISOString().split("T")[0];
  saveData();
  document.getElementById("modal-overlay").classList.remove("show");
  refreshAll();
  showToast("条目已更新");
}

function openAddForm(){
  var catOpts=CATS.map(function(c){return'<option value="'+c+'">'+c+'</option>'}).join("");

    '<div class="modal-field"><label>版本</label><input id="add-ver" class="form-input" value="v0.1"></div>'+
    '<div class="modal-field"><label>状态</label><select id="add-status" class="form-input">'+statOpts+'</select></div>'+

    '<button type="submit" style="width:100%;background:linear-gradient(135deg,var(--tcc),var(--inest));border:none;color:#000;padding:10px;border-radius:8px;font-weight:600;cursor:pointer;font-family:inherit;margin-top:8px">添加条目</button></form>';
  document.getElementById("modal-overlay").classList.add("show");
}

function addEntry(ev){
  ev.preventDefault();
  var entry={
    id:Math.max.apply(null,[0].concat(appData.entries.map(function(e){return e.id})))+1,
    dim:document.getElementById("add-dim").value,
    cat:document.getElementById("add-cat").value,
    title:document.getElementById("add-title").value,
    ver:document.getElementById("add-ver").value,
    status:document.getElementById("add-status").value,
    priority:document.getElementById("add-priority").value,
    desc:document.getElementById("add-desc").value,
    date:new Date().toISOString().split("T")[0],
    link:document.getElementById("add-link").value||null
  };
  appData.entries.push(entry);saveData();
  document.getElementById("modal-overlay").classList.remove("show");
  refreshAll();
  showToast("新条目已添加");
}

function deleteEntry(id){
  if(!confirm("确定要删除此条目吗？此操作不可撤销。"))return;
  appData.entries=appData.entries.filter(function(e){return e.id!==id});
  saveData();refreshAll();
  showToast("条目已删除");
}

// ─── MODAL ───
function closeModal(ev){
  if(ev&&ev.target!==document.getElementById("modal-overlay"))return;
  document.getElementById("modal-overlay").classList.remove("show");
}

// ─── VIEW SWITCH ───
function switchView(view){
  document.querySelectorAll(".header-nav button").forEach(function(b){b.classList.remove("active")});
  var btn=document.querySelector('[data-view="'+view+'"]');
  if(btn)btn.classList.add("active");
  document.querySelectorAll(".view-panel").forEach(function(p){p.classList.remove("active")});
  var panel=document.getElementById("view-"+view);
  if(panel){panel.classList.add("active");gsap.from(panel,{opacity:0,duration:0.3,ease:"power2.out"})}
  if(view==="index")renderIndex();
}

// ─── REFRESH ALL ───
function refreshAll(){
  renderMetrics();renderDaily();renderKanban();
  var av=document.querySelector(".view-panel.active");
  if(av&&av.id==="view-index")renderIndex();
}

// ─── GSAP ───
function animateIn(){
  gsap.from(".metric",{opacity:0,y:20,duration:0.5,stagger:0.06,ease:"power2.out"});
  gsap.from(".paradigm-banner",{opacity:0,y:10,duration:0.5,ease:"power2.out",delay:0.15});
  gsap.from(".daily-card",{opacity:0,y:16,duration:0.4,stagger:0.08,ease:"power2.out",delay:0.2});
  gsap.from(".kanban-col",{opacity:0,y:12,duration:0.35,stagger:0.04,ease:"power2.out",delay:0.4});
}

// ─── INIT ───
document.addEventListener("DOMContentLoaded",function(){
  document.getElementById("header-date").textContent=new Date().toLocaleDateString("zh-CN",{year:"numeric",month:"long",day:"numeric",weekday:"long"});
  document.querySelectorAll(".header-nav button").forEach(function(b){
    b.addEventListener("click",function(){switchView(b.dataset.view)});
  });
  document.addEventListener("keydown",function(e){if(e.key==="Escape")closeModal()});
  refreshAll();animateIn();
});
